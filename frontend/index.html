<!DOCTYPE html>
<html lang="ha">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Rafiq — Abokin Hankalinka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220;
    --panel:#131B2E;
    --panel-2:#1B2540;
    --gold:#D4A017;
    --teal:#2FBF9F;
    --text:#F5F1E6;
    --muted:#8B93A7;
    --danger:#E5484D;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .pattern-bar{
    height:6px;
    width:100%;
    background: repeating-linear-gradient(
      45deg,
      var(--gold) 0px, var(--gold) 6px,
      transparent 6px, transparent 12px
    );
    opacity:0.9;
  }
  header{
    padding:16px 18px 14px;
    background:var(--panel);
    border-bottom:1px solid rgba(212,160,23,0.15);
    display:flex;
    align-items:center;
    gap:12px;
  }
  .avatar{
    width:42px;height:42px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--gold), #8a6a10);
    display:flex;align-items:center;justify-content:center;
    font-family:'Cairo',sans-serif;font-weight:800;color:#0B1220;font-size:18px;
    flex-shrink:0;
  }
  .title{display:flex;flex-direction:column;}
  .title h1{
    font-family:'Cairo',sans-serif;
    font-size:19px;
    margin:0;
    font-weight:700;
    letter-spacing:0.3px;
  }
  .title span{font-size:12.5px;color:var(--muted);}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);display:inline-block;margin-left:6px;box-shadow:0 0 6px var(--teal);}
  #chat{
    flex:1;
    overflow-y:auto;
    padding:18px 14px 8px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .msg{
    max-width:82%;
    padding:11px 14px;
    border-radius:16px;
    line-height:1.45;
    font-size:15px;
    white-space:pre-wrap;
    animation:fadeIn 0.25s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .msg.user{
    align-self:flex-end;
    background:var(--teal);
    color:#04231C;
    border-bottom-right-radius:4px;
  }
  .msg.bot{
    align-self:flex-start;
    background:var(--panel-2);
    border-bottom-left-radius:4px;
  }
  .msg.error{
    align-self:center;
    background:rgba(229,72,77,0.15);
    color:#ff9a9d;
    font-size:13.5px;
    border:1px solid rgba(229,72,77,0.35);
  }
  .typing{
    align-self:flex-start;
    display:flex;gap:4px;padding:12px 16px;
    background:var(--panel-2);border-radius:16px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--muted);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0.3;}40%{opacity:1;}}
  .hint{
    font-size:11.5px;
    color:var(--muted);
    text-align:center;
    padding:2px 24px 8px;
  }
  form#inputBar{
    display:flex;
    align-items:flex-end;
    gap:8px;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:var(--panel);
    border-top:1px solid rgba(212,160,23,0.15);
  }
  textarea#userInput{
    flex:1;
    resize:none;
    max-height:110px;
    min-height:42px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    background:var(--panel-2);
    color:var(--text);
    padding:11px 16px;
    font-size:15px;
    font-family:inherit;
    outline:none;
  }
  textarea#userInput:focus{border-color:var(--gold);}
  button.icon-btn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:transform 0.15s ease, background 0.15s ease;
  }
  button.icon-btn:active{transform:scale(0.92);}
  #sendBtn{background:var(--gold);color:#0B1220;}
  #micBtn{background:var(--panel-2);color:var(--text);border:1px solid rgba(255,255,255,0.1);}
  #micBtn.listening{
    background:var(--danger);
    color:#fff;
    animation:pulse 1.2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(229,72,77,0.5);}
    70%{box-shadow:0 0 0 12px rgba(229,72,77,0);}
    100%{box-shadow:0 0 0 0 rgba(229,72,77,0);}
  }
  select#voiceLang{
    background:var(--panel-2);
    color:var(--muted);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    font-size:12px;
    padding:4px 6px;
    flex-shrink:0;
  }
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(212,160,23,0.3);border-radius:10px;}
</style>
</head>
<body>

<div class="pattern-bar"></div>

<header>
  <div class="avatar">ر</div>
  <div class="title">
    <h1>Rafiq <span class="status-dot"></span></h1>
    <span>Abokin hankalinka na AI • Hausa · English · العربية</span>
  </div>
</header>

<div id="chat">
  <div class="msg bot">Assalamu Alaikum! 👋 Ni ne Rafiq, abokin hankalinka na AI. Zan iya taimaka maka da tambayoyi, karatu, ko wani abu da kake bukata — a Hausa, Turanci, ko Larabci. Yaya zan iya taimaka maka yau?</div>
</div>

<div class="hint" id="hint"></div>

<form id="inputBar">
  <select id="voiceLang" title="Harshen murya">
    <option value="ha-NG">🎙️ HA</option>
    <option value="en-US">🎙️ EN</option>
    <option value="ar-SA">🎙️ AR</option>
  </select>
  <button type="button" id="micBtn" class="icon-btn" title="Yi magana">🎤</button>
  <textarea id="userInput" rows="1" placeholder="Rubuta saƙo… (ko danna 🎤 don magana)"></textarea>
  <button type="submit" id="sendBtn" class="icon-btn" title="Aika">➤</button>
</form>

<script>
  const BACKEND_URL = "https://rafiq-ai-rmgu.onrender.com/api/chat";

  const chat = document.getElementById("chat");
  const form = document.getElementById("inputBar");
  const input = document.getElementById("userInput");
  const micBtn = document.getElementById("micBtn");
  const voiceLang = document.getElementById("voiceLang");
  const hint = document.getElementById("hint");

  let history = [];

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });

  function addMessage(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing";
    div.id = "typingIndicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addMessage(text, "user");
    history.push({ role: "user", content: text });
    input.value = "";
    input.style.height = "auto";
    showTyping();

    try {
      const res = await fetch(BACKEND_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      hideTyping();

      if (!res.ok || !data.reply) {
        addMessage(data.error || "An kasa samun amsa. A duba haɗin intanet ko a sake gwadawa.", "error");
        return;
      }
      addMessage(data.reply, "bot");
      history.push({ role: "assistant", content: data.reply });
    } catch (err) {
      hideTyping();
      addMessage("An kasa haɗawa da uwar garke. A duba haɗin intanet.", "error");
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizer = null;
  let listening = false;

  if (SpeechRecognition) {
    recognizer = new SpeechRecognition();
    recognizer.continuous = false;
    recognizer.interimResults = false;

    recognizer.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      input.value = transcript;
      sendMessage(transcript);
    };
    recognizer.onend = () => {
      listening = false;
      micBtn.classList.remove("listening");
    };
    recognizer.onerror = () => {
      listening = false;
      micBtn.classList.remove("listening");
    };
  }

  micBtn.addEventListener("click", () => {
    const lang = voiceLang.value;

    if (lang === "ha-NG" || !recognizer) {
      hint.textContent = "💡 Don Hausa: danna sararin rubutu sannan ka yi amfani da alamar makirifo (🎤) da ke kan keyboard ɗin wayarka (Gboard) — yana iya jin Hausa kai tsaye.";
      input.focus();
      return;
    }

    if (listening) {
      recognizer.stop();
      return;
    }

    hint.textContent = "";
    recognizer.lang = lang;
    recognizer.start();
    listening = true;
    micBtn.classList.add("listening");
  });
</script>
</body>
</html>
